        [79,"T2-26-02-08-0007-0079-2","111523875","SILVIA LAURA NURANI","Sukabumi, 10 Maret 2011",40,40],
        [6,"T2-26-02-08-0007-0006-3","118855517","RIDHAN ADITYA PRATAMA","Sukabumi, 8 Agustus 2011",33.33,46.67],
        [90,"T2-26-02-08-0007-0090-7","118451982","SEPTIANI ANGGREINI","Sukabumi, 21 September 2011",33.33,46.67],
        [7,"T2-26-02-08-0007-0007-2","105333718","LYCANDRA JULIAN RAHMADI","Sukabumi, 14 Juli 2010",30,50],
        [3,"T2-26-02-08-0007-0003-6","106644089","MUHAMAD ALI NURWAHID","Sukabumi, 20 Juli 2010",33.33,40],
        [4,"T2-26-02-08-0007-0004-5","117088191","KEYSHA RAFANI ALKHAIRA","Sukabumi, 9 November 2011",23.33,50],
        [5,"T2-26-02-08-0007-0005-4","109060633","MOCH AZRIEL FACHRIZI INDRAPURA","Sukabumi, 4 Juni 2010",30,40],
        [16,"T2-26-02-08-0007-0016-9","117405297","SITI SARAH JAINAL","Sukabumi, 19 Juli 2011",30,40]
    ];

    // Load ke Map
    for (const row of rawData) {
        const nisn = String(row[2]).trim();
        const nomorPeserta = row[1];
        const nama = row[3];
        const nilaiMatematika = row[5];
        const nilaiBahasaIndonesia = row[6];
        studentsData.set(nisn, {
            nama: nama,
            nomorPeserta: nomorPeserta,
            matematika: nilaiMatematika,
            bahasaIndonesia: nilaiBahasaIndonesia
        });
    }

    // DOM elements
    const nisnInput = document.getElementById('nisnInput');
    const cekBtn = document.getElementById('cekBtn');
    const resultArea = document.getElementById('resultArea');

    // Fungsi render hasil
    function displayResult(nisn) {
        const normalizedNisn = nisn.trim();
        if (normalizedNisn === "") {
            resultArea.innerHTML = `
                <div class="result-card not-found" style="background:#fff1f0; border-left-color:#c0392b;">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span>⚠️</span> <strong>Masukkan NISN terlebih dahulu</strong>
                    </div>
                </div>`;
            return;
        }

        const student = studentsData.get(normalizedNisn);
        if (!student) {
            resultArea.innerHTML = `
                <div class="result-card not-found">
                    <div class="result-header">
                        <span>🔍</span>
                        <h3>Data tidak ditemukan</h3>
                    </div>
                    <div style="padding: 6px 0px;">NISN <strong>${escapeHtml(normalizedNisn)}</strong> tidak terdaftar dalam basis data TKA.<br>
                    Pastikan NISN yang dimasukkan benar (9-10 digit) dan sesuai data ujian.</div>
                </div>`;
            return;
        }

        // Format nilai
        const mathValue = student.matematika;
        const indoValue = student.bahasaIndonesia;

        resultArea.innerHTML = `
            <div class="result-card" style="animation: fadeIn 0.2s ease;">
                <div class="result-header">
                    <span>📄</span>
                    <h3>Hasil Tes Kemampuan Akademik</h3>
                </div>
                <div class="detail-item">
                    <span class="detail-label">👤 Nama Lengkap</span>
                    <span class="detail-value">${escapeHtml(student.nama)}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🎫 Nomor Peserta</span>
                    <span class="detail-value">${escapeHtml(student.nomorPeserta)}</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">📐 Nilai Matematika</span>
                    <span class="detail-value"><span class="nilai-mat score-badge">${mathValue}</span> &nbsp; / 100</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">📖 Nilai Bahasa Indonesia</span>
                    <span class="detail-value"><span class="nilai-indo score-badge">${indoValue}</span> &nbsp; / 100</span>
                </div>
                <div class="footer-note" style="margin-top: 18px; background:#e9f0f9;">
                    ✅ Data sesuai dengan hasil TKA SMPN 7 Sukabumi
                </div>
            </div>
        `;
    }

    // simple escape html
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // event listener
    cekBtn.addEventListener('click', () => {
        displayResult(nisnInput.value);
    });

    nisnInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            displayResult(nisnInput.value);
        }
    });

    // optional: tampilkan placeholder awal (kosong)
    resultArea.innerHTML = `
        <div class="result-card" style="opacity:0.7; text-align:center; background:#f3f6fc;">
            <span>✨ Masukkan NISN lalu tekan 'Cek Nilai' ✨</span>
        </div>
    `;
</script>
</body>
</html>
